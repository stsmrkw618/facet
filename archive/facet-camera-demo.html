<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facet — Face Angle Detector Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0A0A0F;
    --surface: #14141F;
    --accent: #E8C872;
    --accent-soft: rgba(232,200,114,0.12);
    --accent-glow: rgba(232,200,114,0.25);
    --text: #F0EDE6;
    --text-muted: #8A8698;
    --text-dim: #5A5668;
    --border: rgba(232,200,114,0.08);
    --success: #72E8A0;
    --warning: #E8A872;
    --danger: #E87272;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans: 'DM Sans', 'Helvetica Neue', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Ambient glow ── */
  body::before {
    content: '';
    position: fixed;
    top: -30%; right: -20%;
    width: 60vw; height: 60vw;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.25;
    z-index: 0;
  }

  /* ── Layout ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 1.5rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .header h1 {
    font-family: var(--font-serif);
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--accent);
  }
  .header p {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }

  /* ── Loading ── */
  #loading-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }
  #loading-screen.hidden { display: none; }

  .spinner {
    width: 48px; height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-align: center;
  }
  .loading-sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.25rem;
  }

  #start-btn {
    padding: 0.9rem 2.5rem;
    border-radius: 30px;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: var(--font-sans);
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.3s;
  }
  #start-btn:hover {
    background: var(--accent-soft);
  }
  #start-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* ── Camera ── */
  #camera-screen { display: none; flex: 1; flex-direction: column; }
  #camera-screen.active { display: flex; }

  .viewfinder {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid var(--border);
    background: #111;
    transition: border-color 0.3s;
  }
  .viewfinder.good { border-color: var(--warning); }
  .viewfinder.perfect { border-color: var(--success); box-shadow: 0 0 30px rgba(114, 232, 160, 0.15); }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
    pointer-events: none;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
    border-width: 0;
    transition: border-color 0.3s;
  }
  .corner.tl { top: 14px; left: 14px; border-top-width: 2px; border-left-width: 2px; border-radius: 4px 0 0 0; }
  .corner.tr { top: 14px; right: 14px; border-top-width: 2px; border-right-width: 2px; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: 14px; left: 14px; border-bottom-width: 2px; border-left-width: 2px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: 14px; right: 14px; border-bottom-width: 2px; border-right-width: 2px; border-radius: 0 0 4px 0; }

  /* ── Angle Display ── */
  .angle-panel {
    margin-top: 1.25rem;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
  }

  .angle-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem;
    text-align: center;
  }
  .angle-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 0.35rem;
  }
  .angle-value {
    font-family: var(--font-serif);
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
  }
  .angle-unit {
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .angle-desc {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
  }

  /* ── Symmetry ── */
  .symmetry-section {
    margin-top: 1.25rem;
  }
  .section-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
  }

  .symmetry-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .sym-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sym-name {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .sym-bar-container {
    width: 60px;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }
  .sym-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
  }
  .sym-value {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    min-width: 32px;
    text-align: right;
  }

  /* ── Guidance ── */
  .guidance {
    margin-top: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    text-align: center;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.2rem;
    transition: border-color 0.3s;
  }
  .guidance.detecting { border-color: var(--accent); }
  .guidance-text {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.5;
  }
  .guidance-sub {
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  /* ── No face ── */
  .no-face {
    font-size: 0.85rem;
    color: var(--text-dim);
    text-align: center;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* ── Score circle ── */
  .score-section {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }
  .score-ring {
    position: relative;
    width: 80px;
    height: 80px;
  }
  .score-ring svg {
    transform: rotate(-90deg);
    width: 80px;
    height: 80px;
  }
  .score-ring .bg {
    fill: none;
    stroke: rgba(255,255,255,0.05);
    stroke-width: 4;
  }
  .score-ring .fg {
    fill: none;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s, stroke 0.3s;
  }
  .score-number {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 400;
  }
  .score-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: center;
    margin-top: 0.15rem;
  }
  .score-detail {
    text-align: left;
  }
  .score-detail-item {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .score-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Fade in */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.6s ease; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>FACET</h1>
    <p>リアルタイム顔角度検出デモ</p>
  </div>

  <!-- Loading / Start -->
  <div id="loading-screen">
    <div id="loader-content">
      <div class="spinner"></div>
      <div class="loading-text">
        MediaPipeモデルを読み込み中...
        <div class="loading-sub">初回は数秒かかります</div>
      </div>
    </div>
    <button id="start-btn" disabled>カメラを起動する</button>
  </div>

  <!-- Camera View -->
  <div id="camera-screen">
    <div class="viewfinder" id="viewfinder">
      <video id="video" autoplay playsinline></video>
      <canvas id="overlay"></canvas>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <!-- Angle Meters -->
    <div class="angle-panel fade-in">
      <div class="angle-card">
        <div class="angle-label">YAW</div>
        <div class="angle-value" id="yaw-val">0<span class="angle-unit">°</span></div>
        <div class="angle-desc">左右の向き</div>
      </div>
      <div class="angle-card">
        <div class="angle-label">PITCH</div>
        <div class="angle-value" id="pitch-val">0<span class="angle-unit">°</span></div>
        <div class="angle-desc">上下の傾き</div>
      </div>
      <div class="angle-card">
        <div class="angle-label">ROLL</div>
        <div class="angle-value" id="roll-val">0<span class="angle-unit">°</span></div>
        <div class="angle-desc">首の傾げ</div>
      </div>
    </div>

    <!-- Symmetry Analysis -->
    <div class="symmetry-section fade-in">
      <div class="section-label">SYMMETRY ANALYSIS</div>
      <div class="symmetry-grid">
        <div class="sym-card">
          <span class="sym-name">左目</span>
          <div class="sym-bar-container"><div class="sym-bar" id="sym-left-eye"></div></div>
          <span class="sym-value" id="sym-left-eye-val">-</span>
        </div>
        <div class="sym-card">
          <span class="sym-name">右目</span>
          <div class="sym-bar-container"><div class="sym-bar" id="sym-right-eye"></div></div>
          <span class="sym-value" id="sym-right-eye-val">-</span>
        </div>
        <div class="sym-card">
          <span class="sym-name">口 左</span>
          <div class="sym-bar-container"><div class="sym-bar" id="sym-left-mouth"></div></div>
          <span class="sym-value" id="sym-left-mouth-val">-</span>
        </div>
        <div class="sym-card">
          <span class="sym-name">口 右</span>
          <div class="sym-bar-container"><div class="sym-bar" id="sym-right-mouth"></div></div>
          <span class="sym-value" id="sym-right-mouth-val">-</span>
        </div>
      </div>
    </div>

    <!-- Overall Score -->
    <div class="score-section fade-in">
      <div>
        <div class="score-ring">
          <svg viewBox="0 0 80 80">
            <circle class="bg" cx="40" cy="40" r="34"></circle>
            <circle class="fg" id="score-circle" cx="40" cy="40" r="34"
              stroke-dasharray="213.6" stroke-dashoffset="213.6"></circle>
          </svg>
          <div class="score-number" id="score-number">--</div>
        </div>
        <div class="score-label">SYMMETRY SCORE</div>
      </div>
      <div class="score-detail">
        <div class="score-detail-item">
          <div class="score-dot" style="background: var(--success)"></div>
          <span>90+ 高い対称性</span>
        </div>
        <div class="score-detail-item">
          <div class="score-dot" style="background: var(--warning)"></div>
          <span>70-89 平均的</span>
        </div>
        <div class="score-detail-item">
          <div class="score-dot" style="background: var(--danger)"></div>
          <span>~69 左右差あり</span>
        </div>
      </div>
    </div>

    <!-- Guidance -->
    <div class="guidance" id="guidance">
      <div class="no-face">顔を検出中...</div>
    </div>
  </div>
</div>

<!-- MediaPipe Tasks Vision -->
<script type="module">
import { FaceLandmarker, FilesetResolver, DrawingUtils } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

// ── State ──
let faceLandmarker;
let video, canvas, ctx;
let running = false;
let lastTimestamp = -1;
let smoothYaw = 0, smoothPitch = 0, smoothRoll = 0;
const SMOOTH = 0.3; // lower = smoother

// ── DOM refs ──
const loadingScreen = document.getElementById('loading-screen');
const loaderContent = document.getElementById('loader-content');
const startBtn = document.getElementById('start-btn');
const cameraScreen = document.getElementById('camera-screen');
const viewfinder = document.getElementById('viewfinder');
const guidanceEl = document.getElementById('guidance');

// ── Initialize MediaPipe ──
async function initMediaPipe() {
  try {
    const filesetResolver = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      outputFaceBlendshapes: true,
      outputFacialTransformationMatrixes: true,
      runningMode: "VIDEO",
      numFaces: 1
    });

    console.log("MediaPipe FaceLandmarker loaded");
    loaderContent.innerHTML = `
      <div style="font-size: 1.5rem; color: var(--success); margin-bottom: 0.5rem;">✓</div>
      <div class="loading-text">準備完了！</div>
    `;
    startBtn.disabled = false;
  } catch (err) {
    console.error("MediaPipe init error:", err);
    loaderContent.innerHTML = `
      <div style="color: var(--danger); font-size: 0.85rem;">
        モデル読み込みに失敗しました<br>
        <span style="font-size: 0.75rem; color: var(--text-dim);">${err.message}</span>
      </div>
    `;
  }
}

// ── Start Camera ──
async function startCamera() {
  video = document.getElementById('video');
  canvas = document.getElementById('overlay');
  ctx = canvas.getContext('2d');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;

    await new Promise(resolve => {
      video.onloadeddata = resolve;
    });

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    loadingScreen.classList.add('hidden');
    cameraScreen.classList.add('active');

    running = true;
    detectLoop();
  } catch (err) {
    console.error("Camera error:", err);
    guidanceEl.innerHTML = `<div style="color: var(--danger); font-size: 0.8rem;">
      カメラアクセスが拒否されました。設定を確認してください。
    </div>`;
  }
}

// ── Detection Loop ──
function detectLoop() {
  if (!running) return;

  const now = performance.now();
  if (now === lastTimestamp) {
    requestAnimationFrame(detectLoop);
    return;
  }
  lastTimestamp = now;

  const results = faceLandmarker.detectForVideo(video, now);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.faceLandmarks && results.faceLandmarks.length > 0) {
    const landmarks = results.faceLandmarks[0];

    // Draw face mesh (subtle)
    drawFaceMesh(landmarks);

    // Calculate angles from transformation matrix
    let yaw = 0, pitch = 0, roll = 0;

    if (results.facialTransformationMatrixes && results.facialTransformationMatrixes.length > 0) {
      const matrix = results.facialTransformationMatrixes[0].data;
      const angles = matrixToEulerAngles(matrix);
      yaw = angles.yaw;
      pitch = angles.pitch;
      roll = angles.roll;
    } else {
      // Fallback: estimate from landmarks
      const angles = estimateAnglesFromLandmarks(landmarks);
      yaw = angles.yaw;
      pitch = angles.pitch;
      roll = angles.roll;
    }

    // Smooth
    smoothYaw += (yaw - smoothYaw) * SMOOTH;
    smoothPitch += (pitch - smoothPitch) * SMOOTH;
    smoothRoll += (roll - smoothRoll) * SMOOTH;

    updateAngleDisplay(smoothYaw, smoothPitch, smoothRoll);

    // Symmetry analysis
    const symmetry = analyzeSymmetry(landmarks);
    updateSymmetryDisplay(symmetry);

    // Guidance
    updateGuidance(smoothYaw, smoothPitch, smoothRoll, symmetry);
  } else {
    // No face detected
    guidanceEl.innerHTML = `<div class="no-face">顔を検出中...</div>`;
    viewfinder.className = 'viewfinder';
  }

  requestAnimationFrame(detectLoop);
}

// ── Extract Euler angles from 4x4 transformation matrix ──
function matrixToEulerAngles(m) {
  // m is a flat array of 16 elements (4x4 row-major matrix)
  // Extract rotation part:
  // [ m[0] m[1] m[2]  m[3]  ]
  // [ m[4] m[5] m[6]  m[7]  ]
  // [ m[8] m[9] m[10] m[11] ]
  // [ m[12] m[13] m[14] m[15] ]

  const r00 = m[0], r01 = m[1], r02 = m[2];
  const r10 = m[4], r11 = m[5], r12 = m[6];
  const r20 = m[8], r21 = m[9], r22 = m[10];

  // YXZ decomposition (common for head pose)
  let yaw, pitch, roll;

  if (Math.abs(r21) < 0.99999) {
    pitch = Math.asin(-r21);
    yaw = Math.atan2(r20, r22);
    roll = Math.atan2(r01, r11);
  } else {
    pitch = r21 > 0 ? -Math.PI / 2 : Math.PI / 2;
    yaw = Math.atan2(-r02, r00);
    roll = 0;
  }

  const toDeg = 180 / Math.PI;
  return {
    yaw: yaw * toDeg,
    pitch: pitch * toDeg,
    roll: roll * toDeg
  };
}

// ── Fallback: estimate from key landmarks ──
function estimateAnglesFromLandmarks(landmarks) {
  // Nose tip: 1, Left eye outer: 33, Right eye outer: 263
  // Chin: 152, Forehead: 10
  const nose = landmarks[1];
  const leftEye = landmarks[33];
  const rightEye = landmarks[263];
  const chin = landmarks[152];
  const forehead = landmarks[10];

  // Yaw: horizontal offset of nose relative to eye midpoint
  const eyeMidX = (leftEye.x + rightEye.x) / 2;
  const eyeWidth = Math.abs(rightEye.x - leftEye.x);
  const yaw = ((nose.x - eyeMidX) / (eyeWidth || 0.001)) * 60;

  // Pitch: vertical position of nose relative to eyes-chin line
  const eyeMidY = (leftEye.y + rightEye.y) / 2;
  const faceHeight = Math.abs(chin.y - forehead.y);
  const pitch = ((nose.y - eyeMidY) / (faceHeight || 0.001) - 0.33) * 80;

  // Roll: eye line angle
  const roll = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x) * (180 / Math.PI);

  return { yaw: -yaw, pitch: -pitch, roll: -roll };
}

// ── Draw face mesh ──
function drawFaceMesh(landmarks) {
  // Draw key landmarks only (eyes, nose, jawline)
  const keyPoints = [
    // Left eye
    33, 160, 158, 133, 153, 144,
    // Right eye
    263, 387, 385, 362, 380, 373,
    // Nose
    1, 2, 98, 327,
    // Lips
    61, 291, 0, 17,
    // Jawline
    10, 152, 234, 454,
    // Face oval key points
    136, 365, 127, 356
  ];

  ctx.fillStyle = 'rgba(232, 200, 114, 0.4)';
  for (const idx of keyPoints) {
    const pt = landmarks[idx];
    ctx.beginPath();
    ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw eye connections
  drawConnection(landmarks, [33, 160, 158, 133, 153, 144, 33], 'rgba(232, 200, 114, 0.25)');
  drawConnection(landmarks, [263, 387, 385, 362, 380, 373, 263], 'rgba(232, 200, 114, 0.25)');

  // Draw center line (nose)
  drawConnection(landmarks, [10, 1, 152], 'rgba(232, 200, 114, 0.15)');

  // Draw symmetry reference line
  const midTop = landmarks[10];
  const midBot = landmarks[152];
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = 'rgba(232, 200, 114, 0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(midTop.x * canvas.width, midTop.y * canvas.height);
  ctx.lineTo(midBot.x * canvas.width, midBot.y * canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawConnection(landmarks, indices, color) {
  if (indices.length < 2) return;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  const first = landmarks[indices[0]];
  ctx.moveTo(first.x * canvas.width, first.y * canvas.height);
  for (let i = 1; i < indices.length; i++) {
    const pt = landmarks[indices[i]];
    ctx.lineTo(pt.x * canvas.width, pt.y * canvas.height);
  }
  ctx.stroke();
}

// ── Symmetry Analysis ──
function analyzeSymmetry(landmarks) {
  const nose = landmarks[1];

  // Eye openness (height/width ratio)
  const leftEyeH = dist(landmarks[159], landmarks[145]);  // upper-lower
  const leftEyeW = dist(landmarks[33], landmarks[133]);   // inner-outer
  const rightEyeH = dist(landmarks[386], landmarks[374]);
  const rightEyeW = dist(landmarks[263], landmarks[362]);

  const leftEyeRatio = leftEyeW > 0 ? leftEyeH / leftEyeW : 0;
  const rightEyeRatio = rightEyeW > 0 ? rightEyeH / rightEyeW : 0;

  // Mouth corner distances from nose center
  const leftMouthDist = dist(landmarks[61], nose);
  const rightMouthDist = dist(landmarks[291], nose);

  // Normalize to percentages (higher = more open/larger)
  const maxEyeRatio = Math.max(leftEyeRatio, rightEyeRatio, 0.001);
  const maxMouthDist = Math.max(leftMouthDist, rightMouthDist, 0.001);

  const leftEyePct = (leftEyeRatio / maxEyeRatio) * 100;
  const rightEyePct = (rightEyeRatio / maxEyeRatio) * 100;
  const leftMouthPct = (leftMouthDist / maxMouthDist) * 100;
  const rightMouthPct = (rightMouthDist / maxMouthDist) * 100;

  // Overall symmetry score (100 = perfect)
  const eyeSymmetry = 100 - Math.abs(leftEyePct - rightEyePct);
  const mouthSymmetry = 100 - Math.abs(leftMouthPct - rightMouthPct) * 2;
  const overallScore = Math.max(0, Math.min(100, (eyeSymmetry * 0.6 + mouthSymmetry * 0.4)));

  return {
    leftEye: leftEyePct,
    rightEye: rightEyePct,
    leftMouth: leftMouthPct,
    rightMouth: rightMouthPct,
    score: overallScore
  };
}

function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2 + ((a.z || 0) - (b.z || 0)) ** 2);
}

// ── Update UI ──
function updateAngleDisplay(yaw, pitch, roll) {
  document.getElementById('yaw-val').innerHTML =
    `${yaw >= 0 ? '+' : ''}${Math.round(yaw)}<span class="angle-unit">°</span>`;
  document.getElementById('pitch-val').innerHTML =
    `${pitch >= 0 ? '+' : ''}${Math.round(pitch)}<span class="angle-unit">°</span>`;
  document.getElementById('roll-val').innerHTML =
    `${roll >= 0 ? '+' : ''}${Math.round(roll)}<span class="angle-unit">°</span>`;
}

function updateSymmetryDisplay(sym) {
  // Eye bars
  setSymBar('sym-left-eye', sym.leftEye);
  setSymBar('sym-right-eye', sym.rightEye);
  setSymBar('sym-left-mouth', sym.leftMouth);
  setSymBar('sym-right-mouth', sym.rightMouth);

  // Score ring
  const score = Math.round(sym.score);
  const circle = document.getElementById('score-circle');
  const circumference = 213.6; // 2 * π * 34
  const offset = circumference - (circumference * score / 100);
  circle.style.strokeDashoffset = offset;

  const color = score >= 90 ? 'var(--success)' : score >= 70 ? 'var(--warning)' : 'var(--danger)';
  circle.style.stroke = color;

  const numberEl = document.getElementById('score-number');
  numberEl.textContent = score;
  numberEl.style.color = color;
}

function setSymBar(id, value) {
  const bar = document.getElementById(id);
  const valEl = document.getElementById(id + '-val');
  const pct = Math.min(100, Math.max(0, value));
  bar.style.width = pct + '%';
  const color = pct > 90 ? 'var(--success)' : pct > 75 ? 'var(--warning)' : 'var(--danger)';
  bar.style.background = color;
  valEl.textContent = Math.round(pct) + '%';
}

function updateGuidance(yaw, pitch, roll, symmetry) {
  const tips = [];
  const absYaw = Math.abs(yaw);
  const absPitch = Math.abs(pitch);
  const absRoll = Math.abs(roll);

  if (absYaw < 5 && absPitch < 5 && absRoll < 3) {
    viewfinder.className = 'viewfinder perfect';
    guidanceEl.className = 'guidance detecting';
    guidanceEl.innerHTML = `
      <div class="guidance-text" style="color: var(--success);">✦ ほぼ正面です</div>
      <div class="guidance-sub">対称性スコア: ${Math.round(symmetry.score)}</div>
    `;
    return;
  }

  if (yaw > 8) tips.push('← 左を向いています');
  else if (yaw < -8) tips.push('→ 右を向いています');

  if (pitch > 8) tips.push('↓ 下を向いています');
  else if (pitch < -8) tips.push('↑ 上を向いています');

  if (roll > 5) tips.push('⟲ 右に傾いています');
  else if (roll < -5) tips.push('⟳ 左に傾いています');

  if (tips.length === 0) {
    tips.push('○ 良い角度です');
    viewfinder.className = 'viewfinder good';
  } else {
    viewfinder.className = 'viewfinder';
  }

  guidanceEl.className = 'guidance';
  guidanceEl.innerHTML = tips.map(t =>
    `<div class="guidance-text">${t}</div>`
  ).join('');
}

// ── Bootstrap ──
startBtn.addEventListener('click', startCamera);
initMediaPipe();
</script>
