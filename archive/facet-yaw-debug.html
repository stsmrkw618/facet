<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facet — Yaw Debug</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0F; color: #F0EDE6; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1rem; }
  video { width: 320px; aspect-ratio: 4/3; object-fit: cover; transform: scaleX(-1); border-radius: 12px; border: 2px solid #333; }
  canvas { display: none; }
  .big { font-size: 3rem; margin: 1rem 0; font-weight: bold; }
  .data { font-family: monospace; font-size: 0.9rem; color: #8A8698; line-height: 2; }
  .dir { font-size: 2rem; margin: 0.5rem 0; padding: 0.5rem 1.5rem; border-radius: 12px; }
  .dir.left { background: rgba(114,232,160,0.15); color: #72E8A0; }
  .dir.right { background: rgba(232,168,114,0.15); color: #E8A872; }
  .dir.center { background: rgba(232,200,114,0.15); color: #E8C872; }
  .instruction { margin: 1rem 0; padding: 1rem; background: #14141F; border-radius: 12px; font-size: 0.8rem; color: #8A8698; max-width: 400px; line-height: 1.8; }
  button { margin: 1rem; padding: 0.7rem 2rem; border-radius: 20px; border: 1px solid #E8C872; background: transparent; color: #E8C872; font-size: 0.9rem; cursor: pointer; }
</style>
</head>
<body>

<h2 style="color:#E8C872; margin-bottom:0.5rem;">Yaw Direction Debug</h2>

<div class="instruction">
  <strong>テスト方法：</strong><br>
  ① カメラを起動する<br>
  ② 自分から見て<strong>左</strong>を向く → 「← LEFT」と表示されれば正しい<br>
  ③ 自分から見て<strong>右</strong>を向く → 「RIGHT →」と表示されれば正しい<br>
  ④ 逆だった場合、下の「Yaw符号を反転」ボタンを押して再テスト
</div>

<button id="start-btn">カメラ起動</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="big" id="yaw-display">--°</div>
<div class="dir center" id="direction">待機中</div>

<div class="data">
  <div>Raw Yaw: <span id="raw-yaw">--</span></div>
  <div>Inverted: <span id="inverted">NO</span></div>
  <div>Matrix available: <span id="has-matrix">--</span></div>
</div>

<button id="flip-btn" style="border-color:#E87272; color:#E87272;">Yaw符号を反転</button>

<script type="module">
import { FaceLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

let faceLandmarker;
let video, canvas;
let running = false;
let lastTs = -1;
let invertYaw = false;

const yawDisplay = document.getElementById('yaw-display');
const dirDisplay = document.getElementById('direction');
const rawYawEl = document.getElementById('raw-yaw');
const invertedEl = document.getElementById('inverted');
const hasMatrixEl = document.getElementById('has-matrix');

document.getElementById('flip-btn').addEventListener('click', () => {
  invertYaw = !invertYaw;
  invertedEl.textContent = invertYaw ? 'YES' : 'NO';
});

document.getElementById('start-btn').addEventListener('click', async () => {
  // Init MediaPipe
  const fs = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(fs, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU"
    },
    outputFaceBlendshapes: false,
    outputFacialTransformationMatrixes: true,
    runningMode: "VIDEO",
    numFaces: 1
  });

  video = document.getElementById('video');
  canvas = document.getElementById('canvas');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
  });
  video.srcObject = stream;
  await new Promise(r => { video.onloadeddata = r; });
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  running = true;
  loop();
});

let smoothYaw = 0;

function loop() {
  if (!running) return;
  const now = performance.now();
  if (now === lastTs) { requestAnimationFrame(loop); return; }
  lastTs = now;

  const results = faceLandmarker.detectForVideo(video, now);

  if (results.faceLandmarks?.length > 0) {
    let yaw = 0;
    let usedMatrix = false;

    if (results.facialTransformationMatrixes?.length > 0) {
      const m = results.facialTransformationMatrixes[0].data;
      const r20 = m[8], r22 = m[10];
      yaw = Math.atan2(r20, r22) * (180 / Math.PI);
      usedMatrix = true;
    } else {
      const lm = results.faceLandmarks[0];
      const nose = lm[1], le = lm[33], re = lm[263];
      const emx = (le.x + re.x) / 2;
      const ew = Math.abs(re.x - le.x) || 0.001;
      yaw = ((nose.x - emx) / ew) * 60;
    }

    hasMatrixEl.textContent = usedMatrix ? 'YES' : 'NO (fallback)';
    rawYawEl.textContent = yaw.toFixed(1) + '°';

    if (invertYaw) yaw = -yaw;

    smoothYaw += (yaw - smoothYaw) * 0.3;
    const rounded = Math.round(smoothYaw);

    yawDisplay.textContent = (rounded >= 0 ? '+' : '') + rounded + '°';

    if (rounded < -8) {
      dirDisplay.textContent = '← LEFT（あなたの左）';
      dirDisplay.className = 'dir left';
    } else if (rounded > 8) {
      dirDisplay.textContent = 'RIGHT（あなたの右）→';
      dirDisplay.className = 'dir right';
    } else {
      dirDisplay.textContent = '● CENTER';
      dirDisplay.className = 'dir center';
    }
  } else {
    yawDisplay.textContent = '--°';
    dirDisplay.textContent = '顔が見つかりません';
    dirDisplay.className = 'dir center';
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
